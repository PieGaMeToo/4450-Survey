<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="mainHeader">AI Chat</div>
  <div style="display:flex; gap:20px; height:520px;">
    <!-- LEFT: Chat History -->
    <div class="chat-box" id="chatBox" style="flex:2;"></div>

    <!-- RIGHT: Input Panel -->
    <div style="flex:1; display:flex; flex-direction:column;">
      <textarea id="userInput" placeholder="Type your message here..." style="flex:1; margin-top:0;"></textarea>
      <button id="sendBtn">Send</button>
      <!-- Dropdown for selecting language for AI, with 30 preset languages and an Other option to type in option-->
      <p>Select a language as prompted in the survey:</p>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="zh-CN">Chinese (Simplified)</option>
        <option value="zh-TW">Chinese (Traditional)</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="bn">Bengali</option>
        <option value="tr">Turkish</option>
        <option value="nl">Dutch</option>
        <option value="el">Greek</option>
        <option value="he">Hebrew</option>
        <option value="vi">Vietnamese</option>
        <option value="th">Thai</option>
        <option value="pl">Polish</option>
        <option value="uk">Ukrainian</option>
        <option value="sv">Swedish</option>
        <option value="no">Norwegian</option>
        <option value="da">Danish</option>
        <option value="fi">Finnish</option>
        <option value="cs">Czech</option>
        <option value="hu">Hungarian</option>
        <option value="ro">Romanian</option>
        <option value="id">Indonesian</option>
        <option value="other">Other</option>
      </select>
      <input type="text" id="otherLanguageInput" placeholder="Enter language name..." style="display:none; margin-top:5px; padding:5px;">
    </div>
  </div>
</div>

<script>
let userId = localStorage.getItem("uid");
if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("uid", userId);
}

document.getElementById("sendBtn").onclick = () => {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += "<div><b>You:</b> " + message + "</div>";
    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";

    const aiDiv = document.createElement("div");
    aiDiv.innerHTML = "<b>AI:</b> ";
    chatBox.appendChild(aiDiv);

    let lang = document.getElementById("languageSelect").value;
    if (lang === "other") {
        lang = document.getElementById("otherLanguageInput").value.trim() || "English";
    }

    // SSE connection
    const evtSource = new EventSource(`/chat-stream-sse?userId=${userId}&message=${encodeURIComponent(message)}`);

    evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.partial) {
            aiDiv.innerHTML = "<b>AI:</b> " + data.partial;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        if (data.done) {
            aiDiv.innerHTML = "<b>AI:</b> " + data.reply;
            chatBox.scrollTop = chatBox.scrollHeight;
            evtSource.close();
        }
        if (data.error) {
            aiDiv.innerHTML = "<b>AI:</b> [Error]";
            evtSource.close();
        }
    };

    evtSource.onerror = (err) => {
        console.error("SSE error", err);
        evtSource.close();
    };
};

// Handle language selection and "Other" option
document.getElementById("languageSelect").addEventListener("change", (e) => {
    const otherInput = document.getElementById("otherLanguageInput");
    if (e.target.value === "other") {
        otherInput.style.display = "block";
        otherInput.focus();
    } else {
        otherInput.style.display = "none";
    }
});
</script>

</body>
</html>
