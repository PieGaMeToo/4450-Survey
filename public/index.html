<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <div class="mainHeader">
    AI Chat
  </div>

  <div style="display:flex; gap:20px; height:520px;">

    <!-- LEFT: Chat History -->
    <div class="chat-box" id="chatBox" style="flex:2;">
    </div>

    <!-- RIGHT: Input Panel -->
    <div style="flex:1; display:flex; flex-direction:column;">
      
      <textarea 
        id="userInput" 
        placeholder="Type your message here..."
        style="flex:1; margin-top:0;"
      ></textarea>

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

</div>

<script>

let userId = localStorage.getItem("uid");

if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("uid", userId);
}

document.getElementById("sendBtn").onclick = async () => {

    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    const chatBox = document.getElementById("chatBox");

    // Display user message
    chatBox.innerHTML += "<div><b>You:</b> " + message + "</div>";
    chatBox.scrollTop = chatBox.scrollHeight;

    input.value = "";

    // Create AI placeholder
    const aiDiv = document.createElement("div");
    aiDiv.innerHTML = "<b>AI:</b> ";
    chatBox.appendChild(aiDiv);

    const response = await fetch("/chat-stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, message })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullReply = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split("\n").filter(Boolean);

        for (const line of lines) {
            if (!line.startsWith("data:")) continue;

            const data = JSON.parse(line.replace(/^data:\s*/, ""));

            if (data.partial) {
                fullReply = data.partial;
                aiDiv.innerHTML = "<b>AI:</b> " + fullReply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            if (data.done) {
                aiDiv.innerHTML = "<b>AI:</b> " + data.reply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    }
};

</script>

</body>
</html>
