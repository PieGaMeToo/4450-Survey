<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="mainHeader">AI Chat</div>
  <div style="display:flex; gap:20px; height:520px;">
    <!-- LEFT: Chat History -->
    <div class="chat-box" id="chatBox"></div>
    
    <!-- RIGHT: Input Panel -->
    <div style="flex:1; display:flex; flex-direction:column;">
      <div class="input-panel">
        <textarea id="userInput" placeholder="Type your message here..."></textarea>
        <button id="sendBtn">Send</button>
        <p>Select a language as prompted in the survey:</p>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="zh-TW">Chinese (Traditional)</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="bn">Bengali</option>
          <option value="tr">Turkish</option>
          <option value="nl">Dutch</option>
          <option value="el">Greek</option>
          <option value="he">Hebrew</option>
          <option value="vi">Vietnamese</option>
          <option value="th">Thai</option>
          <option value="pl">Polish</option>
          <option value="uk">Ukrainian</option>
          <option value="sv">Swedish</option>
          <option value="no">Norwegian</option>
          <option value="da">Danish</option>
          <option value="fi">Finnish</option>
          <option value="cs">Czech</option>
          <option value="hu">Hungarian</option>
          <option value="ro">Romanian</option>
          <option value="id">Indonesian</option>
          <option value="other">Other</option>
        </select>
        <input type="text" id="otherLanguageInput" placeholder="Enter language name..." style="display:none;">
      </div>
    </div>
  </div>
</div>

<script>
let userId = localStorage.getItem("uid");
if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("uid", userId);
}

// Helper to add chat messages
function addMessage(content, sender) {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `chat-message ${sender}`;
    div.textContent = content;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
}

document.getElementById("sendBtn").onclick = () => {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;
    input.value = "";

    // Add user message
    addMessage(message, "user");

    // Determine language
    let lang = document.getElementById("languageSelect").value;
    if (lang === "other") {
        lang = document.getElementById("otherLanguageInput").value.trim() || "English";
    }

    // Placeholder for AI response (updates dynamically)
    const aiDiv = addMessage("", "ai");

    // SSE request
    const evtSource = new EventSource(
        `/chat-stream-sse?userId=${userId}&message=${encodeURIComponent(message)}&lang=${encodeURIComponent(lang)}`
    );

    evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.partial) {
            aiDiv.textContent = data.partial;
        }
        if (data.done) {
            aiDiv.textContent = data.reply;
            evtSource.close();
        }
        if (data.error) {
            aiDiv.textContent = "[Error]";
            evtSource.close();
        }
    };

    evtSource.onerror = (err) => {
        console.error("SSE error", err);
        evtSource.close();
    };
};

// Show/hide "Other" language input
document.getElementById("languageSelect").addEventListener("change", (e) => {
    const otherInput = document.getElementById("otherLanguageInput");
    if (e.target.value === "other") {
        otherInput.style.display = "block";
        otherInput.focus();
    } else {
        otherInput.style.display = "none";
    }
});
</script>

</body>
</html>
