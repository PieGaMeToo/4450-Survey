<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="mainHeader">AI Chat</div>
  <div style="display:flex; gap:20px; height:520px;">
    <!-- LEFT: Chat History -->
    <div class="chat-box" id="chatBox" style="flex:2;"></div>

    <!-- RIGHT: Input Panel -->
    <div style="flex:1; display:flex; flex-direction:column;">
      <textarea id="userInput" placeholder="Type your message here..." style="flex:1; margin-top:0;"></textarea>
      <button id="sendBtn">Send</button>
      <!-- Dropdown for selecting language -->
      <p>Select a language as prompted in the survey:</p>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="zh-CN">Chinese (Simplified)</option>
        <option value="zh-TW">Chinese (Traditional)</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="bn">Bengali</option>
        <option value="tr">Turkish</option>
        <option value="nl">Dutch</option>
        <option value="el">Greek</option>
        <option value="he">Hebrew</option>
        <option value="vi">Vietnamese</option>
        <option value="th">Thai</option>
        <option value="pl">Polish</option>
        <option value="uk">Ukrainian</option>
        <option value="sv">Swedish</option>
        <option value="no">Norwegian</option>
        <option value="da">Danish</option>
        <option value="fi">Finnish</option>
        <option value="cs">Czech</option>
        <option value="hu">Hungarian</option>
        <option value="ro">Romanian</option>
        <option value="id">Indonesian</option>
        <option value="other">Other</option>
      </select>
      <input type="text" id="otherLanguageInput" placeholder="Enter language name..." style="display:none; margin-top:5px; padding:5px;">
    </div>
  </div>
</div>

<script>
let userId = localStorage.getItem("uid");
if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("uid", userId);
}

// Format AI responses: bold + split into paragraphs
function formatResponse(text) {
    // 1. Replace **bold** with <b>bold</b>
    let html = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    // 2. Split into paragraphs by line breaks or bullet markers
    let lines = html.split(/\n|\*/).filter(l => l.trim() !== "");
    // Wrap each line in <p>
    return lines.map(l => `<p>${l.trim()}</p>`).join("");
}

// Add message to chat box
const chatBox = document.getElementById("chatBox");
function addMessage(content, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `chat-message ${sender}`;
    msgDiv.innerHTML = formatResponse(content);
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send button click
document.getElementById("sendBtn").onclick = () => {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    // Add user message bubble
    addMessage(message, "user");
    input.value = "";

    let lang = document.getElementById("languageSelect").value;
    if (lang === "other") {
        lang = document.getElementById("otherLanguageInput").value.trim() || "English";
    }

    // SSE connection
    const evtSource = new EventSource(
        `/chat-stream-sse?userId=${userId}&message=${encodeURIComponent(message)}&lang=${encodeURIComponent(lang)}`
    );

    evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.partial) {
            // Update last AI bubble or create one
            if (!chatBox.lastChild || !chatBox.lastChild.classList.contains("ai")) {
                addMessage(data.partial, "ai");
            } else {
                chatBox.lastChild.innerHTML = formatResponse(data.partial);
            }
        }
        if (data.done) {
            if (!chatBox.lastChild.classList.contains("ai")) addMessage(data.reply, "ai");
            evtSource.close();
        }
        if (data.error) {
            addMessage("[Error]", "ai");
            evtSource.close();
        }
    };

    evtSource.onerror = (err) => {
        console.error("SSE error", err);
        evtSource.close();
    };
};

// Handle "Other" language input
document.getElementById("languageSelect").addEventListener("change", (e) => {
    const otherInput = document.getElementById("otherLanguageInput");
    if (e.target.value === "other") {
        otherInput.style.display = "block";
        otherInput.focus();
    } else {
        otherInput.style.display = "none";
    }
});
</script>

</body>
</html>
