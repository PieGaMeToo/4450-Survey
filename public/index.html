<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat with Draft</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="mainHeader">AI Chat Study</div>

  <div id="page1" class="page">
    <h2>Select Your Language</h2>

    <select id="languageSelect">
      <option value="English">English</option>
      <option value="Spanish">Spanish</option>
      <option value="Chinese (Simplified)">Chinese (Simplified)</option>
      <option value="Chinese (Traditional)">Chinese (Traditional)</option>
      <option value="Korean">Korean</option>
      <option value="Vietnamese">Vietnamese</option>
      <option value="Hindi">Hindi</option>
      <option value="Other">Other</option>
    </select>

    <input type="text" id="otherLanguageInput" placeholder="Enter language..." style="display:none;">

    <button id="toPage2">Continue</button>
  </div>

  <div id="page2" class="page" style="display:none;">
    <h2>Select a Task</h2>

    <div class="task-list">
      <label class="taskOption">
        <input type="radio" name="task" value="essay">
        Task One
      </label>

      <label class="taskOption">
        <input type="radio" name="task" value="brainstorm">
        Task Two
      </label>

      <label class="taskOption">
        <input type="radio" name="task" value="outline">
        Task Three
      </label>

      <label class="taskOption">
        <input type="radio" name="task" value="editing">
        Task Four
      </label>
    </div>

    <div class="navButtons">
      <button id="backTo1">Back</button>
      <button id="toPage3">Continue</button>
    </div>
  </div>

  <div id="page3" class="page" style="display:none;">

    <h3 id="taskDisplay">Current Task:</h3>

    <div class="layout">

      <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>

        <div class="input-panel">
          <textarea id="aiInput" placeholder="Type your message to AI..."></textarea>
          <button id="sendBtn">Send</button>
        </div>
      </div>

      <div class="draft-container">

        <div class="timerBox">
          <div id="timerDisplay">10:00</div>
          <button id="startTimerBtn">Start</button>
        </div>

        <p><b>Your Outline / Draft:</b></p>

        <textarea id="draftBox"></textarea>

        <button id="submitDraftBtn" class="submitBtn">Submit Draft</button>

      </div>

    </div>

    <button id="backTo2">Back</button>

  </div>

  <div id="page4" class="page" style="display:none;">
    <h2>Thank You</h2>

    <p>
    Thank you for taking the survey.
    </p>

    <p>
    Please return to the Qualtrics survey to finish the study.
    </p>
  </div>

</div>

<script>
let userId = localStorage.getItem("uid");
let selectedLanguage = "";
let selectedTask = "";

let editingIndex = null;
let originalText = "";

let aiGenerating = false;
const sendBtn = document.getElementById("sendBtn");
if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("uid", userId);
}

const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const page3 = document.getElementById("page3");
const page4 = document.getElementById("page4");

document.getElementById("toPage2").onclick = () => {

    let lang = document.getElementById("languageSelect").value;

    if (lang === "Other") {
        lang = document.getElementById("otherLanguageInput").value.trim();
    }

    if (!lang) {
        alert("Please select a language.");
        return;
    }

    selectedLanguage = lang;

    page1.style.display = "none";
    page2.style.display = "block";
};

document.getElementById("backTo1").onclick = () => {
    page2.style.display = "none";
    page1.style.display = "block";
};

document.getElementById("toPage3").onclick = () => {

    const task = document.querySelector('input[name="task"]:checked');

    if(!task){
        alert("Please select a task.");
        return;
    }

    selectedTask = task.value;

    document.getElementById("taskDisplay").textContent =
        "Current Task: " + task.parentElement.textContent.trim();

    page2.style.display = "none";
    page3.style.display = "block";
};

document.getElementById("submitDraftBtn").onclick = async () => {

    const confirmSubmit = confirm(
        "Are you sure you want to submit? You will not be able to return."
    );

    if (!confirmSubmit) return;

    clearInterval(timerInterval);

    const draft = document.getElementById("draftBox").value;

    await fetch("/submit-draft", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            userId: userId,
            language: selectedLanguage,
            task: selectedTask,
            draft: draft
        })
    });

    page3.style.display = "none";
    page4.style.display = "block";
};

document.getElementById("backTo2").onclick = () => {
    page3.style.display = "none";
    page2.style.display = "block";
};

let timerInterval;
let timeRemaining = 600; // 10 minutes in seconds
let timerStarted = false;

const timerDisplay = document.getElementById("timerDisplay");
const startTimerBtn = document.getElementById("startTimerBtn");

function updateTimerDisplay() {
    const minutes = Math.floor(timeRemaining / 60);
    const seconds = timeRemaining % 60;

    timerDisplay.textContent =
        `${minutes}:${seconds.toString().padStart(2,'0')}`;
}

startTimerBtn.onclick = () => {

    if (timerStarted) return;

    timerStarted = true;

    startTimerBtn.disabled = true;
    startTimerBtn.style.opacity = "0.5";
    startTimerBtn.style.cursor = "not-allowed";

    timerInterval = setInterval(() => {

        timeRemaining--;
        updateTimerDisplay();

        if (timeRemaining <= 0) {

            clearInterval(timerInterval);

            alert("Time is up! Your draft will now be submitted.");

            page3.style.display = "none";
            page4.style.display = "block";
        }

    }, 1000);
};

function formatResponse(text) {
    let html = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    let lines = html.split(/\n|\*/).filter(l => l.trim() !== "");
    return lines.map(l => `<p>${l.trim()}</p>`).join("");
}

const chatBox = document.getElementById("chatBox");
function addMessage(content, sender, index=null) {

    const msgDiv = document.createElement("div");
    msgDiv.className = `chat-message ${sender}`;

    if(index !== null){
      msgDiv.dataset.index = index;
    }

    msgDiv.innerHTML = formatResponse(content);

    if(sender === "user"){
        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.className = "editBtn";

        editBtn.onclick = () => startEditing(msgDiv);

        msgDiv.appendChild(editBtn);
    }

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {

    if (aiGenerating) return;

    const input = document.getElementById("aiInput");
    const message = input.value.trim();
    if (!message) return;


    if(editingIndex !== null){

      const messages = Array.from(chatBox.children);

      messages.forEach(msg => {

        const idx = parseInt(msg.dataset.index);

        if(!isNaN(idx) && idx > editingIndex){
            msg.remove();
        }

      });

    }
    aiGenerating = true;
    sendBtn.disabled = true;

    const draftContent = document.getElementById("draftBox").value.trim();
    let fullMessage =
    `Task: ${selectedTask}

    ${message}`;

    if (draftContent) {
        fullMessage += `\n\nCurrent Draft:\n${draftContent}`;
    }

    let messageIndex;

    if(editingIndex !== null){
        messageIndex = editingIndex;
    }else{
        messageIndex = chatBox.children.length;
    }

    addMessage(message, "user", messageIndex);
    input.value = "";

    let lang = selectedLanguage;

    const evtSource = new EventSource(
        `/chat-stream-sse?userId=${userId}&message=${encodeURIComponent(fullMessage)}&lang=${encodeURIComponent(lang)}&editIndex=${editingIndex ?? ""}`
    );

    evtSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.partial) {
          if (!chatBox.lastChild || !chatBox.lastChild.classList.contains("ai")) {
              addMessage(data.partial, "ai");
          } else {
              chatBox.lastChild.innerHTML = formatResponse(data.partial);
          }
      }
      if (data.done) {

        if (!chatBox.lastChild.classList.contains("ai")) {
            const messageIndex = chatBox.children.length;
            addMessage(data.reply, "ai", messageIndex);
        }

        aiGenerating = false;
        sendBtn.disabled = false;

        evtSource.close();
      }
      if (data.error) {

        addMessage("[Error]", "ai");

        aiGenerating = false;
        sendBtn.disabled = false;

        evtSource.close();
      }
    };

    evtSource.onerror = (err) => {
        console.error("SSE error", err);
        evtSource.close();
    };

    editingIndex = null;

    const cancelBtn = document.getElementById("cancelEditBtn");
    if(cancelBtn) cancelBtn.remove();

    document.getElementById("aiInput").style.background = "white";
}

function startEditing(msgDiv){

    const index = parseInt(msgDiv.dataset.index);

    editingIndex = index;
    originalText = msgDiv.innerText.replace("Edit","").trim();

    const input = document.getElementById("aiInput");

    input.value = originalText;
    input.style.background = "#f0f0f0";

    const cancelBtn = document.createElement("button");
    cancelBtn.id = "cancelEditBtn";
    cancelBtn.textContent = "Cancel";

    cancelBtn.onclick = cancelEdit;

    document.querySelector(".input-panel").appendChild(cancelBtn);
}

function cancelEdit(){

    editingIndex = null;

    const input = document.getElementById("aiInput");
    input.value = "";
    input.style.background = "white";

    const cancelBtn = document.getElementById("cancelEditBtn");
    if(cancelBtn) cancelBtn.remove();
}

document.getElementById("sendBtn").onclick = sendMessage;

document.getElementById("aiInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

document.getElementById("languageSelect").addEventListener("change", (e) => {
    const otherInput = document.getElementById("otherLanguageInput");
    if (e.target.value === "other") {
        otherInput.style.display = "block";
        otherInput.focus();
    } else {
        otherInput.style.display = "none";
    }
});
</script>

</body>
</html>
