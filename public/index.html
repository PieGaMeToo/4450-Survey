<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat with Draft</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="mainHeader">AI Chat</div>

  <!-- Chat + Draft layout -->
  <div class="layout">
    <!-- LEFT: Chat history -->
    <div class="chat-container">
      <div class="chat-box" id="chatBox"></div>

      <!-- AI input panel -->
      <div class="input-panel">
        <textarea id="aiInput" placeholder="Type your message to AI..."></textarea>
        <p>Select a language:</p>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="zh-TW">Chinese (Traditional)</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="bn">Bengali</option>
          <option value="tr">Turkish</option>
          <option value="nl">Dutch</option>
          <option value="el">Greek</option>
          <option value="he">Hebrew</option>
          <option value="vi">Vietnamese</option>
          <option value="th">Thai</option>
          <option value="pl">Polish</option>
          <option value="uk">Ukrainian</option>
          <option value="sv">Swedish</option>
          <option value="no">Norwegian</option>
          <option value="da">Danish</option>
          <option value="fi">Finnish</option>
          <option value="cs">Czech</option>
          <option value="hu">Hungarian</option>
          <option value="ro">Romanian</option>
          <option value="id">Indonesian</option>
          <option value="other">Other</option>
        </select>
        <input type="text" id="otherLanguageInput" placeholder="Enter language..." style="display:none;">
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <!-- RIGHT: Outline / Draft box -->
    <div class="draft-container">
      <p><b>Your Outline / Draft:</b></p>
      <textarea id="draftBox" placeholder="Write or compile your draft here..."></textarea>
    </div>
  </div>
</div>

<script>
let userId = localStorage.getItem("uid");
if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("uid", userId);
}

// Format AI responses
function formatResponse(text) {
    let html = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    let lines = html.split(/\n|\*/).filter(l => l.trim() !== "");
    return lines.map(l => `<p>${l.trim()}</p>`).join("");
}

// Add message to chat box
const chatBox = document.getElementById("chatBox");
function addMessage(content, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `chat-message ${sender}`;
    msgDiv.innerHTML = formatResponse(content);
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send button click
document.getElementById("sendBtn").onclick = () => {
    const input = document.getElementById("aiInput");
    const message = input.value.trim();
    if (!message) return;

    // Include current draft as context
    const draftContent = document.getElementById("draftBox").value.trim();
    const fullMessage = draftContent 
        ? message + "\n\nCurrent Draft:\n" + draftContent 
        : message;

    addMessage(message, "user");
    input.value = "";

    let lang = document.getElementById("languageSelect").value;
    if (lang === "other") {
        lang = document.getElementById("otherLanguageInput").value.trim() || "English";
    }

    const evtSource = new EventSource(
        `/chat-stream-sse?userId=${userId}&message=${encodeURIComponent(fullMessage)}&lang=${encodeURIComponent(lang)}`
    );

    evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.partial) {
            if (!chatBox.lastChild || !chatBox.lastChild.classList.contains("ai")) {
                addMessage(data.partial, "ai");
            } else {
                chatBox.lastChild.innerHTML = formatResponse(data.partial);
            }
        }
        if (data.done) {
            if (!chatBox.lastChild.classList.contains("ai")) addMessage(data.reply, "ai");
            evtSource.close();
        }
        if (data.error) {
            addMessage("[Error]", "ai");
            evtSource.close();
        }
    };

    evtSource.onerror = (err) => {
        console.error("SSE error", err);
        evtSource.close();
    };
};

// Handle "Other" language input
document.getElementById("languageSelect").addEventListener("change", (e) => {
    const otherInput = document.getElementById("otherLanguageInput");
    if (e.target.value === "other") {
        otherInput.style.display = "block";
        otherInput.focus();
    } else {
        otherInput.style.display = "none";
    }
});
</script>

</body>
</html>
